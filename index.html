<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stíny Hrádku - Městská Detektivka</title>
    <style>
        /* Základní stylizace - temný detektivní vzhled */
        :root {
            --bg-color: #1a1a2e;
            --text-color: #e0e0e0;
            --accent-color: #d4af37; /* Zlatavá barva pro důležité prvky */
            --input-bg: #16213e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace; /* Písmo připomínající psací stroj */
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin-top: 10vh;
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2em;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: var(--accent-color);
        }

        input {
            width: 100%;
            padding: 15px;
            background-color: var(--input-bg);
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
            box-sizing: border-box; /* Zajistí, že se padding vejde do šířky */
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #f1c40f;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.8em;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Stíny Hrádku</h1>
        <p class="subtitle">Interaktivní detektivní případ v ulicích města</p>

        <div id="login-section">
            <div class="form-group">
                <label for="email">Vyšetřovatelův e-mail:</label>
                <input type="email" id="email" placeholder="agent@seznam.cz" required>
            </div>
            <div class="form-group">
                <label for="password">Tajné heslo:</label>
                <input type="password" id="password" placeholder="********" required>
            </div>
            <div class="form-group">
                <label for="nickname">Přezdívka pro žebříček (jen při registraci):</label>
                <input type="text" id="nickname" placeholder="Např. Sherlock_HN">
            </div>

            <button id="login-btn">Vstoupit do případu</button>
            <p class="footer-text">Hra se automaticky ukládá. Můžeš ji kdykoliv přerušit a vrátit se.</p>
        </div>
    </div>

    <script>
        // Placeholder pro budoucí programování logiky
        document.getElementById('login-btn').addEventListener('click', function() {
            alert('Tlačítko funguje! V dalším kroku sem napojíme databázi Firebase.');
        });
    </script>
</body>
</html>
