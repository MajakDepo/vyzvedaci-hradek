<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stíny Hrádku - Schubertův Plán</title>
    <style>
        :root {
            --bg-color: #0f101a;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #d4af37;
            --input-bg: #0d1117;
            --error: #f85149;
            --success: #3fb950;
        }

        body { margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 92%; max-width: 480px; margin-top: 20px; padding-bottom: 50px; text-align: center; }
        h1 { color: var(--accent-color); text-transform: uppercase; letter-spacing: 3px; font-size: 1.6em; margin-bottom: 15px; }
        .hidden { display: none !important; }

        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid #30363d; border-top: 4px solid var(--accent-color); text-align: left; box-shadow: 0 10px 20px rgba(0,0,0,0.5); margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; font-family: inherit; margin-bottom: 15px; font-size: 1em; }
        textarea { resize: vertical; min-height: 80px; }
        select { cursor: pointer; color: var(--accent-color); font-weight: bold; margin-bottom: 25px; }
        
        button { width: 100%; padding: 16px; background: var(--accent-color); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1em; transition: 0.3s; }
        button:hover { background: #f1c40f; transform: translateY(-2px); }

        /* Navigace */
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 5px; }
        .nav-btn { background: #21262d; color: #c9d1d9; padding: 10px 5px; font-size: 0.85em; border: 1px solid #30363d; flex: 1; border-radius: 6px; }
        .nav-btn.active { background: var(--accent-color); color: #000; border-color: var(--accent-color); }
        .btn-logout { background: transparent; color: #8b949e; border: 1px solid #30363d; padding: 8px 12px; font-size: 0.8em; margin-bottom: 15px; width: auto;}

        /* Herní prvky */
        #next-station-btn { background: var(--success); margin-top: 15px; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; color: var(--accent-color); margin-bottom: 15px; padding: 0 5px; opacity: 0.8; border-bottom: 1px solid #30363d; padding-bottom: 10px;}
        .story-text { line-height: 1.6; color: #8b949e; margin-bottom: 20px; font-size: 1.05em; border-left: 2px solid #30363d; padding-left: 15px; }
        .task-box { background: rgba(212, 175, 55, 0.05); padding: 15px; border-radius: 6px; border: 1px dashed var(--accent-color); margin-bottom: 20px; color: #e0e0e0; font-size: 0.95em; line-height: 1.5; }
        #message { margin-top: 5px; font-weight: bold; font-size: 0.9em; text-align: center; }
        
        #success-area { margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--success); }
        #success-text { color: #e6edf3; font-size: 1em; border-left: 2px solid var(--success); padding-left: 15px; }

        /* Žebříček a Vzkazy */
        .leaderboard-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #30363d; }
        .leaderboard-row:nth-child(1) { color: var(--accent-color); font-weight: bold; font-size: 1.1em; }
        .msg-box { background: #0d1117; padding: 12px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #30363d; }
        .msg-header { font-size: 0.8em; color: var(--accent-color); margin-bottom: 5px; display: flex; justify-content: space-between;}
        .msg-actions { display: flex; gap: 10px; margin-top: 10px; font-size: 0.8em; }
        .action-btn { background: none; border: 1px solid #30363d; color: #8b949e; padding: 5px 10px; border-radius: 4px; cursor: pointer; width: auto; font-size: 1em; }
        .action-btn:hover { background: #30363d; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Stíny Hrádku</h1>

        <div id="auth-section">
            <div class="card">
                <p style="font-size: 0.9em; margin-bottom: 20px; text-align: center;">Zadej své krycí údaje pro vstup do archivu.</p>
                <input type="email" id="email" placeholder="E-mailová adresa">
                <input type="password" id="password" placeholder="Heslo (min. 6 znaků)">
                <input type="text" id="nickname" placeholder="Krycí jméno (přezdívka)">
                <button id="register-btn">Založit nový případ</button>
                <button id="login-btn" style="background:none; color:var(--accent-color); margin-top:10px; border:1px solid var(--accent-color)">Pokračovat ve vyšetřování</button>
                <p id="auth-msg" style="color:var(--error); margin-top:10px; font-size:0.8em; text-align:center;"></p>
            </div>
        </div>

        <div id="app-section" class="hidden">
            <div class="nav-bar">
                <button class="nav-btn active" onclick="switchTab('game-tab')">Pátrání</button>
                <button class="nav-btn" onclick="switchTab('leaderboard-tab')">Žebříček</button>
                <button class="nav-btn" onclick="switchTab('messages-tab')">Komunikace</button>
            </div>
            
            <div style="text-align: right;">
                <button id="logout-btn" class="btn-logout">🚪 Uložit a odejít</button>
            </div>

            <div id="game-tab">
                <div class="status-bar">
                    <span id="player-name">Agent: ---</span>
                    <span id="player-score">Body: 0</span>
                </div>
                <div class="card">
                    <select id="history-select"></select>
                    <div id="story-area" class="story-text"></div>
                    <div id="task-area" class="task-box"></div>
                    
                    <div id="input-group">
                        <input type="text" id="answer-input" placeholder="Zadej kód nebo odpověď">
                        <button id="submit-btn">Odeslat k analýze</button>
                        <p id="message"></p>
                    </div>

                    <div id="success-area" class="hidden">
                        <div id="success-text" class="story-text"></div>
                        <button id="next-station-btn">Přesunout se na další místo</button>
                    </div>
                </div>
            </div>

            <div id="leaderboard-tab" class="hidden card">
                <h2 style="color:var(--accent-color); margin-top:0;">Nejlepší agenti</h2>
                <div id="leaderboard-content">Načítám data...</div>
            </div>

            <div id="messages-tab" class="hidden card">
                <h2 style="color:var(--accent-color); margin-top:0;">Šifrovaný kanál</h2>
                <textarea id="new-msg-text" placeholder="Zanech zprávu pro ostatní agenty..."></textarea>
                <button id="send-msg-btn" style="margin-bottom: 20px;">Odeslat zprávu</button>
                <div id="messages-content">Načítám zprávy...</div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, orderBy, getDocs, addDoc, serverTimestamp, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIU-D7oxVbeSRqmxw3BSoAF6hp0DSzs0E",
            authDomain: "vyzvedaci-hradek.firebaseapp.com",
            projectId: "vyzvedaci-hradek",
            storageBucket: "vyzvedaci-hradek.firebasestorage.app",
            messagingSenderId: "761204740114",
            appId: "1:761204740114:web:b0407841850474d73848cb",
            measurementId: "G-C94H1MXBSE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // STRUKTURA HRY 
        const stations = {
            0: {
                story: `<div style="border-bottom: 1px solid var(--error); margin-bottom: 15px; padding-bottom: 10px;">
                            <strong style="color: var(--error);">NÁZEV ZPRÁVY: URGENTNÍ – PŘEČÍST OKAMŽITĚ!</strong><br>
                            <strong>ODESÍLATEL:</strong> Antonín Král (Místní archiv Hrádek nad Nisou)<br>
                            <strong style="color: var(--error);">STAV:</strong> Odesílatel nezvěstný
                        </div>
                        <p>„Pokud čteš tuto zprávu, znamená to, že se mi nepodařilo uniknout a můj nouzový protokol se aktivoval. Jmenuji se Antonín Král a posledních pět let jsem zasvětil studiu rodiny Schubertových – textilních magnátů, kteří pomáhali budovat Hrádek nad Nisou.</p>
                        <p>Všichni si mysleli, že jejich bohatství pramenilo jen z bavlny a lnu. Omyl. Těsně před vypuknutím války pracoval starý pan Schubert na tajném projektu. Říkal mu <strong>Schubertův plán</strong>. Byla to inovace, která mohla změnit celý průmysl. Když rodina musela město opustit, plány ukryli a rozdělili na několik částí.</p>
                        <p>Před týdnem jsem našel první stopu. Ale nejsem sám. Sleduje mě stínová organizace, která si říká Syndikát. Chtějí plány získat pro sebe a zničit vše, co s nimi souvisí. Musel jsem svůj výzkum zašifrovat a rozesít po celém městě. Ty jsi moje jediná naděje. Najdi plány dřív než oni!“</p>`,
                task: `<strong style="color: var(--accent-color);">SYSTÉMOVÉ HLÁŠENÍ: ARCHIV BĚŽÍ V NOUZOVÉM REŽIMU. PROSÍM, POSTUPUJTE PODLE NÁSLEDUJÍCÍCH POKYNŮ:</strong>
                       <ul>
                           <li><strong>Pohyb v terénu:</strong> Aplikace ti vždy zobrazí indicii, kam musíš v Hrádku dojít.</li>
                           <li><strong>Ověření polohy:</strong> Jakmile dorazíš na místo, rozhlédni se. Aplikace po tobě bude chtít zadat konkrétní detail z místa, čímž prokážeš, že tam opravdu stojíš.</li>
                           <li><strong>Bezpečnost dat:</strong> Pokud musíš pátrání přerušit, klidně aplikaci zavři. Tvůj postup je bezpečně uložen na serveru.</li>
                       </ul>
                       <div style="margin-top: 20px; text-align: center; border-top: 1px dashed var(--accent-color); padding-top: 15px;">
                           <em>Pro zahájení pátrání zadej kód:</em> <strong style="color: white; font-size: 1.1em;">START</strong>
                       </div>`,
                key: "START",
                points: 0,
                successMessage: `<p><strong style="color: var(--success);">TOTOŽNOST OVĚŘENA. PŘÍSTUP POVOLEN.</strong></p>
                                 <p>Tvůj první cíl je <strong>Schubertova vila</strong>. Dojdi k její hlavní bráně. Až tam budeš a připravíš se na první výzvu, klikni na tlačítko níže.</p>`
            },
            1: {
                story: `<p>Jsi u Schubertovy vily. Bývalo to honosné sídlo... Syndikát tam už pravděpodobně byl, ale nevědí, kam přesně se dívat.</p>`,
                task: `<strong style="color: var(--accent-color);">ÚKOL:</strong><br>Když stojíš před hlavní bránou, prohlédni si pozorně schody... Kolik schodů vede ke dveřím od trávníku?`,
                key: "9", points: 10,
                successMessage: `<p><strong style="color: var(--success);">KÓD PŘIJAT.</strong></p>
                                 <p>Našel jsi první fragment. <em>'Zboží musí proudit...'</em></p>
                                 <p><strong>DALŠÍ INDICIE:</strong> Souřadnice: 50.856(A)700N, 14.84(B)9005E <br> A=součet okenic ze silnice-8 <br> B=477-číslo v betonovém zábradlí u branky.</p>`
            },
            2: {
                story: `<p>Dorazil jsi na místo, které do života textilní továrny neodmyslitelně patřilo... Potřebuješ najít další fragment plánu. Ten se ukrývá přesně 170 metrů od místa, kde stojíš, a to v azimutu 336°.</p>`,
                task: `<strong style="color: var(--accent-color);">ÚKOL:</strong><br>Dojdi na toto místo a spočítej, kolik postav zde vidíš.`,
                key: "4", points: 10,
                successMessage: `<p><strong style="color: var(--success);">KÓD PŘIJAT.</strong></p>
                                 <p>Uvnitř sochy byla tajná zásuvka, kde jsi našel další díl fragmentu.</p>
                                 <p><strong>DALŠÍ INDICIE:</strong> Vzkaz přiložený k fragmentu říká: <br><br> Dál musíš hledat útočiště u Boha. Tam, kde město nejhlasitěji odbíjí čas.</p>`
            },
            3: {
                story: `<p>Až dojdeš na ono místo, postav se čelem k hlavnímu vchodu mezi dvě sochy a vzhlédni vzhůru.</p>`,
                task: `<strong style="color: var(--accent-color);">ÚKOL:</strong><br>Spočítej skleněné destičky, které vidíš před sebou v okně.`,
                key: "12", points: 10,
                successMessage: `<p><strong style="color: var(--success);">KÓD PŘIJAT.</strong></p>
                                 <p>V puklině zdi jsi našel další fragment.</p>
                                 <p><strong>DALŠÍ INDICIE:</strong> <em>(Archiv zpracovává další souřadnice...)</em></p>`
            }
        };

        let currentUser = null;
        let userData = null;
        let viewingStationIndex = 0;

        // AUTHENTICATION
        document.getElementById('register-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const nick = document.getElementById('nickname').value;
            if(!email || !pass || !nick) return alert("Vyplň všechna pole!");
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "hraci", res.user.uid), {
                    prezdivka: nick, 
                    body: 0, 
                    aktualniStanoviste: 0, 
                    aktualniPokusy: 0,
                    datumZacatku: new Date().toISOString()
                });
            } catch (e) { document.getElementById('auth-msg').innerText = "Chyba: " + e.message; }
        });

        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (e) { document.getElementById('auth-msg').innerText = "Špatné heslo nebo e-mail."; }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await signOut(auth);
            document.getElementById('app-section').classList.add('hidden');
            document.getElementById('auth-section').classList.remove('hidden');
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "hraci", user.uid));
                if (userDoc.exists()) {
                    userData = userDoc.data();
                    viewingStationIndex = userData.aktualniStanoviste;
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('app-section').classList.remove('hidden');
                    document.getElementById('player-name').innerText = "Agent: " + userData.prezdivka;
                    document.getElementById('player-score').innerText = "Body: " + userData.body;
                    updateHistoryDropdown();
                    renderStation(viewingStationIndex);
                }
            }
        });

        // TABS LOGIC
        window.switchTab = function(tabId) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            ['game-tab', 'leaderboard-tab', 'messages-tab'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            
            if(tabId === 'leaderboard-tab') loadLeaderboard();
            if(tabId === 'messages-tab') loadMessages();
        }

        // LEADERBOARD LOGIC
        async function loadLeaderboard() {
            const q = query(collection(db, "hraci"), orderBy("body", "desc"));
            const querySnapshot = await getDocs(q);
            let html = "";
            let rank = 1;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                html += `<div class="leaderboard-row">
                            <span>${rank}. ${data.prezdivka}</span>
                            <span>${data.body} bodů</span>
                         </div>`;
                rank++;
            });
            document.getElementById('leaderboard-content').innerHTML = html;
        }

        // MESSAGES LOGIC
        async function loadMessages() {
            const q = query(collection(db, "vzkazy"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            let html = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                html += `
                <div class="msg-box">
                    <div class="msg-header"><span>${data.autor}</span></div>
                    <div>${data.text}</div>
                    <div class="msg-actions">
                        <button class="action-btn" onclick="voteMsg('${doc.id}', 'likes')">👍 ${data.likes || 0}</button>
                        <button class="action-btn" onclick="voteMsg('${doc.id}', 'dislikes')">👎 ${data.dislikes || 0}</button>
                    </div>
                </div>`;
            });
            document.getElementById('messages-content').innerHTML = html || "Zatím žádné zprávy.";
        }

        document.getElementById('send-msg-btn').addEventListener('click', async () => {
            const text = document.getElementById('new-msg-text').value;
            if(!text) return;
            await addDoc(collection(db, "vzkazy"), {
                autor: userData.prezdivka,
                text: text,
                timestamp: serverTimestamp(),
                likes: 0, 
                dislikes: 0,
                votedUsers: []
            });
            document.getElementById('new-msg-text').value = "";
            loadMessages();
        });

        window.voteMsg = async function(msgId, field) {
            const msgRef = doc(db, "vzkazy", msgId);
            const msgSnap = await getDoc(msgRef);
            
            if (msgSnap.exists()) {
                const data = msgSnap.data();
                const votedUsers = data.votedUsers || [];
                
                // Kontrola, zda uživatel už nehlasoval
                if (votedUsers.includes(currentUser.uid)) {
                    alert("U tohoto vzkazu jsi již hlasoval.");
                    return;
                }
                
                // Zápis hlasu a uložení uživatele do seznamu hlasujících
                await updateDoc(msgRef, { 
                    [field]: increment(1),
                    votedUsers: arrayUnion(currentUser.uid)
                });
                
                loadMessages(); // Obnova zpráv
            }
        }

        // GAME LOGIC 
        function updateHistoryDropdown() {
            const select = document.getElementById('history-select');
            select.innerHTML = '';
            for (let i = 0; i <= userData.aktualniStanoviste; i++) {
                if(stations[i]) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    let name = i === 0 ? "Nouzový protokol" : `Stopa č. ${i}`;
                    opt.innerText = (i === userData.aktualniStanoviste) ? `AKTIVNÍ: ${name}` : `Archiv: ${name}`;
                    select.appendChild(opt);
                }
            }
            select.value = viewingStationIndex;
        }

        document.getElementById('history-select').addEventListener('change', (e) => {
            viewingStationIndex = parseInt(e.target.value);
            renderStation(viewingStationIndex);
        });

        function renderStation(indexToRender) {
            const s = stations[indexToRender];
            const msgArea = document.getElementById('message');
            const inputGroup = document.getElementById('input-group');
            const successArea = document.getElementById('success-area');
            const nextBtn = document.getElementById('next-station-btn');

            if (s) {
                document.getElementById('story-area').innerHTML = s.story;
                document.getElementById('task-area').innerHTML = s.task;
                if (indexToRender < userData.aktualniStanoviste) {
                    inputGroup.classList.add('hidden');
                    document.getElementById('success-text').innerHTML = s.successMessage;
                    successArea.classList.remove('hidden');
                    nextBtn.classList.add('hidden'); 
                } else {
                    inputGroup.classList.remove('hidden');
                    document.getElementById('answer-input').value = "";
                    msgArea.innerText = "";
                    successArea.classList.add('hidden');
                    nextBtn.classList.remove('hidden');
                }
            } else {
                document.getElementById('story-area').innerHTML = "<p>Gratuluji! Prozatím jsi na konci.</p>";
                document.getElementById('task-area').classList.add('hidden');
                document.getElementById('history-select').classList.add('hidden');
                inputGroup.classList.add('hidden');
                successArea.classList.add('hidden');
            }
        }

        document.getElementById('submit-btn').addEventListener('click', async () => {
            const input = document.getElementById('answer-input').value.trim().toUpperCase();
            const currentStation = stations[userData.aktualniStanoviste];
            
            // Ochrana pro případ, že hráč hraje poprvé a nemá v profilu počet pokusů
            userData.aktualniPokusy = userData.aktualniPokusy || 0;

            if (input === currentStation.key.toUpperCase()) {
                document.getElementById('input-group').classList.add('hidden');
                document.getElementById('success-text').innerHTML = currentStation.successMessage;
                document.getElementById('success-area').classList.remove('hidden');
                
                // BODovací systém podle počtu pokusů (kromě úvodního START kódu)
                let earnedPoints = 0;
                if (currentStation.points > 0) {
                    if (userData.aktualniPokusy === 0) earnedPoints = 2; // Na 1. pokus
                    else if (userData.aktualniPokusy === 1) earnedPoints = 1; // Na 2. pokus
                    else earnedPoints = 0; // 3. a další pokus
                }

                userData.aktualniStanoviste += 1;
                userData.body += earnedPoints;
                userData.aktualniPokusy = 0; // Vynulování pokusů pro další stanoviště
                
                document.getElementById('player-score').innerText = "Body: " + userData.body;
                
                // Uložení stavu do databáze
                await updateDoc(doc(db, "hraci", currentUser.uid), { 
                    aktualniStanoviste: userData.aktualniStanoviste, 
                    body: userData.body,
                    aktualniPokusy: 0
                });
                updateHistoryDropdown();
            } else {
                // Přičtení špatného pokusu
                userData.aktualniPokusy += 1;
                await updateDoc(doc(db, "hraci", currentUser.uid), { 
                    aktualniPokusy: userData.aktualniPokusy 
                });

                document.getElementById('message').style.color = "var(--error)";
                document.getElementById('message').innerText = "× CHYBNÝ KÓD. Zkus to znovu.";
            }
        });

        document.getElementById('next-station-btn').addEventListener('click', () => {
            viewingStationIndex = userData.aktualniStanoviste;
            document.getElementById('history-select').value = viewingStationIndex;
            renderStation(viewingStationIndex);
        });
    </script>
</body>
</html>
