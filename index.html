<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stíny Hrádku - Schubertův Plán</title>
    <style>
        :root {
            --bg-color: #0f101a;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #d4af37;
            --input-bg: #0d1117;
            --error: #f85149;
            --success: #3fb950;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .container { width: 92%; max-width: 480px; margin-top: 30px; padding-bottom: 50px; text-align: center; }
        h1 { color: var(--accent-color); text-transform: uppercase; letter-spacing: 3px; font-size: 1.8em; margin-bottom: 10px; }
        .hidden { display: none !important; }

        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid #30363d; border-top: 4px solid var(--accent-color); text-align: left; box-shadow: 0 10px 20px rgba(0,0,0,0.5); position: relative; }
        input, select { width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; font-family: inherit; margin-bottom: 15px; font-size: 1em; }
        select { cursor: pointer; color: var(--accent-color); font-weight: bold; margin-bottom: 25px; }
        
        button { width: 100%; padding: 16px; background: var(--accent-color); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1em; transition: 0.3s; }
        button:hover { background: #f1c40f; transform: translateY(-2px); }

        .btn-small { background: transparent; color: #8b949e; border: 1px solid #30363d; padding: 8px 12px; font-size: 0.8em; width: auto; margin-left: auto; display: block; margin-bottom: 15px;}
        .btn-small:hover { background: #30363d; color: white; transform: none;}

        .status-bar { display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; color: var(--accent-color); margin-bottom: 15px; padding: 0 5px; opacity: 0.8; border-bottom: 1px solid #30363d; padding-bottom: 10px;}
        
        /* Úprava formátování pro texty */
        .story-text { line-height: 1.6; color: #8b949e; margin-bottom: 20px; font-size: 1.05em; border-left: 2px solid #30363d; padding-left: 15px; }
        .story-text p { margin-top: 0; margin-bottom: 15px; }
        .task-box { background: rgba(212, 175, 55, 0.05); padding: 15px; border-radius: 6px; border: 1px dashed var(--accent-color); margin-bottom: 20px; color: #e0e0e0; font-size: 0.95em; line-height: 1.5; }
        .task-box ul { padding-left: 20px; margin-top: 10px; margin-bottom: 10px; }
        .task-box li { margin-bottom: 8px; }
        
        #message { margin-top: 15px; font-weight: bold; font-size: 0.9em; min-height: 1.2em; text-align: center;}
    </style>
</head>
<body>

    <div class="container">
        <h1>Stíny Hrádku</h1>

        <div id="auth-section">
            <div class="card">
                <p style="font-size: 0.9em; margin-bottom: 20px; text-align: center;">Zadej své krycí údaje pro vstup do archivu.</p>
                <input type="email" id="email" placeholder="E-mailová adresa">
                <input type="password" id="password" placeholder="Heslo (min. 6 znaků)">
                <input type="text" id="nickname" placeholder="Krycí jméno (přezdívka)">
                <button id="register-btn">Založit nový případ</button>
                <button id="login-btn" style="background:none; color:var(--accent-color); margin-top:10px; border:1px solid var(--accent-color)">Pokračovat ve vyšetřování</button>
                <p id="auth-msg" style="color:var(--error); margin-top:10px; font-size:0.8em; text-align:center;"></p>
            </div>
        </div>

        <div id="game-section" class="hidden">
            <div class="status-bar">
                <span id="player-name">Agent: ---</span>
                <span id="player-score">Body: 0</span>
            </div>
            <button id="logout-btn" class="btn-small">🚪 Uložit a odejít</button>

            <div class="card">
                <select id="history-select"></select>

                <div id="story-area" class="story-text">Načítám šifrované záznamy...</div>
                <div id="task-area" class="task-box"></div>
                
                <div id="input-group">
                    <input type="text" id="answer-input" placeholder="Zadej kód nebo odpověď">
                    <button id="submit-btn">Odeslat k analýze</button>
                </div>
                <p id="message"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIU-D7oxVbeSRqmxw3BSoAF6hp0DSzs0E",
            authDomain: "vyzvedaci-hradek.firebaseapp.com",
            projectId: "vyzvedaci-hradek",
            storageBucket: "vyzvedaci-hradek.firebasestorage.app",
            messagingSenderId: "761204740114",
            appId: "1:761204740114:web:b0407841850474d73848cb",
            measurementId: "G-C94H1MXBSE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const stations = {
            0: {
                story: `<div style="border-bottom: 1px solid var(--error); margin-bottom: 15px; padding-bottom: 10px;">
                            <strong style="color: var(--error);">NÁZEV ZPRÁVY: URGENTNÍ – PŘEČÍST OKAMŽITĚ!</strong><br>
                            <strong>ODESÍLATEL:</strong> Antonín Král (Místní archiv Hrádek nad Nisou)<br>
                            <strong style="color: var(--error);">STAV:</strong> Odesílatel nezvěstný
                        </div>
                        <p>„Pokud čteš tuto zprávu, znamená to, že se mi nepodařilo uniknout a můj nouzový protokol se aktivoval. Jmenuji se Antonín Král a posledních pět let jsem zasvětil studiu rodiny Schubertových – textilních magnátů, kteří pomáhali budovat Hrádek nad Nisou.</p>
                        <p>Všichni si mysleli, že jejich bohatství pramenilo jen z bavlny a lnu. Omyl. Těsně před vypuknutím války pracoval starý pan Schubert na tajném projektu. Říkal mu <strong>Schubertův plán</strong>. Byla to inovace, která mohla změnit celý průmysl. Když rodina musela město opustit, plány ukryli a rozdělili na několik částí.</p>
                        <p>Před týdnem jsem našel první stopu. Ale nejsem sám. Sleduje mě stínová organizace, která si říká Syndikát. Chtějí plány získat pro sebe a zničit vše, co s nimi souvisí. Musel jsem svůj výzkum zašifrovat a rozesít po celém městě. Ty jsi moje jediná naděje. Najdi plány dřív než oni!“</p>`,
                task: `<strong style="color: var(--accent-color);">SYSTÉMOVÉ HLÁŠENÍ: ARCHIV BĚŽÍ V NOUZOVÉM REŽIMU. PROSÍM, POSTUPUJTE PODLE NÁSLEDUJÍCÍCH POKYNŮ:</strong>
                       <ul>
                           <li><strong>Pohyb v terénu:</strong> Aplikace ti vždy zobrazí indicii, kam musíš v Hrádku dojít.</li>
                           <li><strong>Ověření polohy:</strong> Jakmile dorazíš na místo, rozhlédni se. Aplikace po tobě bude chtít zadat konkrétní detail z místa (letopočet, slovo, atd.), čímž prokážeš, že tam opravdu stojíš.</li>
                           <li><strong>Bezpečnost dat:</strong> Pokud musíš pátrání přerušit (došla ti baterie, prší, nebo tě sledují), klidně aplikaci zavři. Tvůj postup je bezpečně uložen na našich serverech.</li>
                           <li><strong>Žebříček agentů:</strong> Za každý úspěšně rozluštěný kód získáváš body. Rychlost a bystrý zrak tě posunou v hodnocení výš.</li>
                       </ul>
                       <div style="margin-top: 20px; text-align: center; border-top: 1px dashed var(--accent-color); padding-top: 15px;">
                           <em>Tvůj první cíl je Schubertova vila (Mansberk). Dojdi k její hlavní bráně. Až tam budeš, potvrď připravenost kódem:</em> <strong style="color: white; font-size: 1.1em;">START</strong>
                       </div>`,
                key: "START",
                points: 0
            },
            1: {
                story: `<p>Dobrá práce, jsi na místě. Tady starý Schubert dělal svá nejtajnější rozhodnutí. Antonín mi stihl říct, že první nápovědu nechal přímo u vstupu.</p>`,
                task: `<strong style="color: var(--accent-color);">ÚKOL:</strong><br>Když stojíš před hlavní bránou, prohlédni si pozorně schody, které vedou ke dveřím uprostřed budovy. Kolik schodů vede ke dveřím od trávníku?`,
                key: "9",
                points: 10
            },
            2: {
                story: `<p>Kód přijat! Pod jedním ze schodů jsi našel první fragment plánu. Text na okraji říká: <em>'Zboží musí proudit. Cesta ven je z oceli a páry.'</em></p>`,
                task: `<strong style="color: var(--accent-color);">DALŠÍ INDICIE:</strong><br>Vydej se na místo, kudy Schubertovi odesílali své látky do celého světa. Najdi hlavní vlakové nádraží v Hrádku.`,
                key: "KOLEJE", 
                points: 10
            }
        };

        let currentUser = null;
        let userData = null;
        let viewingStationIndex = 0;

        document.getElementById('register-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const nick = document.getElementById('nickname').value;
            if(!email || !pass || !nick) return alert("Vyplň všechna pole!");
            
            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "hraci", res.user.uid), {
                    prezdivka: nick, body: 0, aktualniStanoviste: 0, datumZacatku: new Date().toISOString()
                });
            } catch (e) { document.getElementById('auth-msg').innerText = "Chyba: " + e.message; }
        });

        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (e) { document.getElementById('auth-msg').innerText = "Špatné heslo nebo e-mail."; }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                await signOut(auth);
                document.getElementById('game-section').classList.add('hidden');
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('auth-msg').style.color = "var(--success)";
                document.getElementById('auth-msg').innerText = "Pozice uložena. Archiv bezpečně opuštěn.";
            } catch (e) {
                alert("Chyba při odhlašování.");
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "hraci", user.uid));
                if (userDoc.exists()) {
                    userData = userDoc.data();
                    viewingStationIndex = userData.aktualniStanoviste;
                    loadGame();
                }
            } else {
                document.getElementById('game-section').classList.add('hidden');
                document.getElementById('auth-section').classList.remove('hidden');
            }
        });

        function loadGame() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('game-section').classList.remove('hidden');
            document.getElementById('player-name').innerText = "Agent: " + userData.prezdivka;
            document.getElementById('player-score').innerText = "Body: " + userData.body;
            updateHistoryDropdown();
            renderStation(viewingStationIndex);
        }

        function updateHistoryDropdown() {
            const select = document.getElementById('history-select');
            select.innerHTML = '';
            for (let i = 0; i <= userData.aktualniStanoviste; i++) {
                if(stations[i]) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    // Stanoviště 0 nazveme "Nouzový protokol", ostatní "Stopa"
                    let name = i === 0 ? "Nouzový protokol" : `Stopa č. ${i}`;
                    opt.innerText = (i === userData.aktualniStanoviste) ? `AKTIVNÍ: ${name}` : `Archiv: ${name}`;
                    select.appendChild(opt);
                }
            }
            select.value = viewingStationIndex;
        }

        document.getElementById('history-select').addEventListener('change', (e) => {
            viewingStationIndex = parseInt(e.target.value);
            renderStation(viewingStationIndex);
        });

        function renderStation(indexToRender) {
            const s = stations[indexToRender];
            const msgArea = document.getElementById('message');
            const inputGroup = document.getElementById('input-group');

            if (s) {
                // Změněno z innerText na innerHTML pro podporu formátování textu
                document.getElementById('story-area').innerHTML = s.story;
                document.getElementById('task-area').innerHTML = s.task;
                
                if (indexToRender < userData.aktualniStanoviste) {
                    inputGroup.classList.add('hidden');
                    msgArea.style.color = "var(--success)";
                    msgArea.innerText = "✓ Tento úkol jsi již úspěšně vyřešil.";
                } else {
                    inputGroup.classList.remove('hidden');
                    document.getElementById('answer-input').value = "";
                    msgArea.innerText = "";
                }
            } else {
                document.getElementById('story-area').innerHTML = "<p>Gratuluji! Našel jsi všechny dostupné fragmenty. Syndikát pro dnešek prohrál, ale brzy přibudou další stanoviště...</p>";
                document.getElementById('task-area').classList.add('hidden');
                document.getElementById('history-select').classList.add('hidden');
                inputGroup.classList.add('hidden');
            }
        }

        document.getElementById('submit-btn').addEventListener('click', async () => {
            const input = document.getElementById('answer-input').value.trim().toUpperCase();
            const currentStation = stations[userData.aktualniStanoviste];
            const msg = document.getElementById('message');

            if (input === currentStation.key.toUpperCase()) {
                msg.style.color = "var(--success)";
                msg.innerText = "✓ KÓD PŘIJAT. ANALÝZA ÚSPĚŠNÁ.";
                
                userData.aktualniStanoviste += 1;
                userData.body += currentStation.points;
                viewingStationIndex = userData.aktualniStanoviste;

                await updateDoc(doc(db, "hraci", currentUser.uid), {
                    aktualniStanoviste: userData.aktualniStanoviste,
                    body: userData.body
                });

                setTimeout(() => {
                    updateHistoryDropdown();
                    renderStation(viewingStationIndex);
                }, 2000);
            } else {
                msg.style.color = "var(--error)";
                msg.innerText = "× CHYBNÝ KÓD. PŘÍSTUP ODMÍTNUT.";
            }
        });
    </script>
</body>
</html>
